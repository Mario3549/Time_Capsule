<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main circle -->
  <circle cx="60" cy="60" r="58" fill="url(#logoGradient)" stroke="url(#innerGradient)" stroke-width="2"/>
  
  <!-- Vault door outline -->
  <rect x="35" y="25" width="50" height="70" rx="8" fill="none" stroke="white" stroke-width="3" opacity="0.9"/>
  
  <!-- Vault door inner frame -->
  <rect x="40" y="30" width="40" height="60" rx="4" fill="none" stroke="white" stroke-width="2" opacity="0.7"/>
  
  <!-- Vault door handle -->
  <circle cx="60" cy="60" r="8" fill="url(#accentGradient)" stroke="white" stroke-width="2"/>
  <circle cx="60" cy="60" r="4" fill="white"/>
  
  <!-- Clock face inside vault -->
  <circle cx="60" cy="60" r="15" fill="none" stroke="white" stroke-width="2" opacity="0.8"/>
  
  <!-- Clock hands -->
  <line x1="60" y1="60" x2="60" y2="48" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="60" x2="68" y2="60" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Center dot -->
  <circle cx="60" cy="60" r="2" fill="white"/>
  
  <!-- Hour markers -->
  <line x1="60" y1="47" x2="60" y2="50" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="60" y1="70" x2="60" y2="73" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="47" y1="60" x2="50" y2="60" stroke="white" stroke-width="1" opacity="0.6"/>
  <line x1="70" y1="60" x2="73" y2="60" stroke="white" stroke-width="1" opacity="0.6"/>
  
  <!-- Lock mechanism -->
  <rect x="55" y="20" width="10" height="8" rx="2" fill="url(#accentGradient)" stroke="white" stroke-width="1"/>
  <circle cx="60" cy="24" r="2" fill="white"/>
  
  <!-- Time capsule representation -->
  <circle cx="25" cy="25" r="6" fill="white" opacity="0.9"/>
  <circle cx="95" cy="95" r="6" fill="white" opacity="0.9"/>
  <line x1="31" y1="31" x2="89" y2="89" stroke="white" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
  
  <!-- Sparkle effects -->
  <circle cx="20" cy="20" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="100" cy="100" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="20" cy="100" r="1" fill="white" opacity="0.6"/>
  <circle cx="100" cy="20" r="1" fill="white" opacity="0.6"/>
  
  <!-- Glow effect -->
  <circle cx="60" cy="60" r="65" fill="none" stroke="url(#innerGradient)" stroke-width="1" opacity="0.3"/>
</svg>
